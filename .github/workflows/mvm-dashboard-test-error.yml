name: MVM dashboard test error

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-error:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create temporary test endpoint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .deploy-test
          one_time_token="$(openssl rand -hex 32)"
          echo "::add-mask::${one_time_token}"
          cat > .deploy-test/mvm-dashboard-test-error.php <<PHP
          <?php

          declare(strict_types=1);

          error_reporting(E_ALL);
          ini_set('display_errors', '0');
          ini_set('log_errors', '1');

          \$expectedToken = '${one_time_token}';
          \$requestToken = isset(\$_GET['token']) && is_string(\$_GET['token']) ? trim(\$_GET['token']) : '';

          header('Content-Type: application/json; charset=utf-8');
          header('X-Content-Type-Options: nosniff');
          header('Cache-Control: no-store');

          if (\$requestToken === '' || !hash_equals(\$expectedToken, \$requestToken)) {
              http_response_code(403);
              echo json_encode(['ok' => false, 'error' => 'Forbidden'], JSON_UNESCAPED_SLASHES | JSON_UNESCAPED_UNICODE);
              exit;
          }

          \$projectRoot = dirname(__DIR__, 2);
          \$privateLogDir = \$projectRoot . DIRECTORY_SEPARATOR . 'private_logs';
          \$logFile = \$privateLogDir . DIRECTORY_SEPARATOR . 'php-error.log';

          if (!is_dir(\$privateLogDir)) {
              @mkdir(\$privateLogDir, 0750, true);
          }

          set_error_handler(static function (int \$severity, string \$message, string \$file, int \$line) use (\$logFile): bool {
              \$type = match (\$severity) {
                  E_USER_WARNING, E_WARNING => 'WARNING',
                  E_USER_NOTICE, E_NOTICE => 'NOTICE',
                  E_USER_ERROR, E_ERROR => 'ERROR',
                  default => 'ERROR',
              };

              \$entry = [
                  'datetime' => date('c'),
                  'type' => \$type,
                  'message' => \$message,
                  'file' => \$file,
                  'line' => \$line,
                  'url' => \$_SERVER['REQUEST_URI'] ?? '',
                  'ip' => \$_SERVER['REMOTE_ADDR'] ?? '',
              ];

              @file_put_contents(\$logFile, json_encode(\$entry, JSON_UNESCAPED_SLASHES | JSON_UNESCAPED_UNICODE) . PHP_EOL, FILE_APPEND | LOCK_EX);

              return true;
          });

          trigger_error('MVM DASHBOARD TESZT ' . date('Y-m-d H:i:s'), E_USER_WARNING);
          restore_error_handler();

          \$checker = \$projectRoot . DIRECTORY_SEPARATOR . 'scripts' . DIRECTORY_SEPARATOR . 'error-checker.php';
          \$checkerRan = false;

          if (is_file(\$checker)) {
              ob_start();
              include \$checker;
              \$checkerOutput = trim((string)ob_get_clean());
              \$checkerRan = true;
          } else {
              \$checkerOutput = 'scripts/error-checker.php not found';
          }

          echo json_encode([
              'ok' => true,
              'triggered' => true,
              'checker_ran' => \$checkerRan,
              'checker_output' => substr(\$checkerOutput, 0, 500),
          ], JSON_UNESCAPED_SLASHES | JSON_UNESCAPED_UNICODE);
          PHP
          printf '%s' "${one_time_token}" > .deploy-test/one-time-token.txt

      - name: Upload temporary files
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --ftp-ssl-reqd \
            --user "${FTP_USER}:${FTP_PASS}" \
            --ftp-create-dirs \
            -T .deploy-test/mvm-dashboard-test-error.php \
            "ftp://${FTP_HOST}/public_html/api/mvm-dashboard-test-error.php"
          curl --fail --silent --show-error \
            --ftp-ssl-reqd \
            --user "${FTP_USER}:${FTP_PASS}" \
            --ftp-create-dirs \
            -T scripts/error-checker.php \
            "ftp://${FTP_HOST}/scripts/error-checker.php"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}

      - name: Trigger test error and checker
        shell: bash
        run: |
          set -euo pipefail
          encoded_token="$(python3 - <<'PY'
          import pathlib
          import urllib.parse
          token = pathlib.Path(".deploy-test/one-time-token.txt").read_text()
          print(urllib.parse.quote(token, safe=""))
          PY
          )"
          curl --fail --silent --show-error \
            --max-time 30 \
            "https://mvm-mezoenergy.hu/api/mvm-dashboard-test-error.php?token=${encoded_token}" \
            -o test-response.json
          cat test-response.json

      - name: Delete temporary files
        if: always()
        shell: bash
        run: |
          curl --silent --show-error \
            --ftp-ssl-reqd \
            --user "${FTP_USER}:${FTP_PASS}" \
            -Q "DELE /public_html/api/mvm-dashboard-test-error.php" \
            "ftp://${FTP_HOST}/" || true
          curl --silent --show-error \
            --ftp-ssl-reqd \
            --user "${FTP_USER}:${FTP_PASS}" \
            -Q "DELE /scripts/error-checker.php" \
            "ftp://${FTP_HOST}/" || true
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
