name: Deploy Google Sheet Import Secret

on:
  workflow_dispatch:

jobs:
  deploy-google-sheet-import-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        env:
          GOOGLE_SHEET_IMPORT_WEBAPP_URL: ${{ secrets.GOOGLE_SHEET_IMPORT_WEBAPP_URL }}
          GOOGLE_SHEET_IMPORT_WEBAPP_TOKEN: ${{ secrets.GOOGLE_SHEET_IMPORT_WEBAPP_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_SHEET_IMPORT_WEBAPP_URL"
          test -n "$GOOGLE_SHEET_IMPORT_WEBAPP_TOKEN"

      - name: Generate secret config file
        env:
          GOOGLE_SHEET_IMPORT_WEBAPP_URL: ${{ secrets.GOOGLE_SHEET_IMPORT_WEBAPP_URL }}
          GOOGLE_SHEET_IMPORT_WEBAPP_TOKEN: ${{ secrets.GOOGLE_SHEET_IMPORT_WEBAPP_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p secret-build/storage/config
          php <<'PHP'
          <?php
          declare(strict_types=1);

          $url = getenv('GOOGLE_SHEET_IMPORT_WEBAPP_URL') ?: '';
          $token = getenv('GOOGLE_SHEET_IMPORT_WEBAPP_TOKEN') ?: '';

          if ($url === '' || $token === '') {
              fwrite(STDERR, "Missing Google Sheet import secret configuration.\n");
              exit(1);
          }

          $content = "<?php\n"
              . "declare(strict_types=1);\n\n"
              . "// Generated by GitHub Actions. Do not edit on the server.\n"
              . "return [\n"
              . "    'GOOGLE_SHEET_IMPORT_WEBAPP_URL' => " . var_export($url, true) . ",\n"
              . "    'GOOGLE_SHEET_IMPORT_WEBAPP_TOKEN' => " . var_export($token, true) . ",\n"
              . "];\n";

          file_put_contents('secret-build/storage/config/google-sheet-import.secret.php', $content);
          PHP

      - name: Deploy generated secret config to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          local-dir: ./secret-build/storage/config/
          server-dir: /storage/config/
